name: Deploy server to VPS

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts || true

      - name: Sync server build to VPS
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" server/dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/deploy/ism-server/dist/
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" server/package*.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/deploy/ism-server/

      - name: Remote deploy: install & restart
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd /home/deploy/ism-server && npm ci --production && pm2 restart ism-server || pm2 start dist/server.js --name ism-server"
