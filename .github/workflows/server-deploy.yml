name: Deploy Server to VPS

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
      - '.github/workflows/server-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install & Build Server
        working-directory: ./server
        env:
          NODE_ENV: production
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      - name: Compress Server Build
        run: |
          tar -czf server-deploy.tar.gz -C server dist/ package.json

      - name: Transfer Build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "server-deploy.tar.gz"
          target: "/tmp"

      - name: Extract & Deploy Server on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            SERVER_PATH="/home/deploy/ism-server"
            BACKUP_PATH="/home/deploy/ism-server-backup"
            TEMP_DIR="/tmp"
            PM2_NAME="ism-server"

            echo "=========================================="
            echo "Starting Server Deployment..."
            echo "=========================================="

            # Create backup
            if [ -d "$SERVER_PATH/dist" ]; then
              echo "[INFO] Creating backup of current deployment..."
              rm -rf "$BACKUP_PATH"
              mkdir -p "$BACKUP_PATH"
              cp -r "$SERVER_PATH/dist" "$BACKUP_PATH/"
              cp -r "$SERVER_PATH/node_modules" "$BACKUP_PATH/" 2>/dev/null || true
              echo "[INFO] Backup created at $BACKUP_PATH"
            fi

            # Extract new build
            echo "[INFO] Extracting new build..."
            mkdir -p "$SERVER_PATH"
            tar -xzf "$TEMP_DIR/server-deploy.tar.gz" -C "$SERVER_PATH" --strip-components=1

            # Verify build
            if [ ! -d "$SERVER_PATH/dist" ]; then
              echo "[ERROR] Server deployment failed - dist/ not found"
              echo "[INFO] Restoring from backup..."
              rm -rf "$SERVER_PATH/dist"
              rm -rf "$SERVER_PATH/node_modules"
              cp -r "$BACKUP_PATH/dist" "$SERVER_PATH/"
              cp -r "$BACKUP_PATH/node_modules" "$SERVER_PATH/" 2>/dev/null || true
              exit 1
            fi

            # Install dependencies
            echo "[INFO] Installing production dependencies..."
            cd "$SERVER_PATH"
            npm ci --production

            # Check if PM2 is available
            if ! command -v pm2 &> /dev/null; then
              echo "[ERROR] PM2 is not installed on VPS"
              exit 1
            fi

            # Reload PM2 process
            echo "[INFO] Reloading PM2 process: $PM2_NAME"
            if pm2 info "$PM2_NAME" > /dev/null 2>&1; then
              pm2 restart "$PM2_NAME" --update-env
              echo "[SUCCESS] Process $PM2_NAME restarted"
            else
              echo "[INFO] Process not running, starting new instance..."
              pm2 start dist/server.js --name "$PM2_NAME" --update-env
              echo "[SUCCESS] Process $PM2_NAME started"
            fi

            pm2 save

            # Verify PM2 status
            echo "[INFO] Verifying process status..."
            pm2 info "$PM2_NAME"

            # Cleanup
            rm -f "$TEMP_DIR/server-deploy.tar.gz"
            echo "[INFO] Cleanup completed"

            echo "=========================================="
            echo "Server Deployment Complete!"
            echo "=========================================="
