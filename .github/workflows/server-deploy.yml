name: Deploy Server to VPS

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
      - '.github/workflows/server-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install & Build Server
        working-directory: ./server
        run: |
          npm ci --include=dev
          npm run build
          rm -rf node_modules

      - name: Compress Server Build
        run: |
          tar -czf server-deploy.tar.gz -C server dist/ package.json package-lock.json

      - name: Transfer Build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "server-deploy.tar.gz"
          target: "/tmp"

      - name: Extract & Deploy Server on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            SERVER_PATH="/home/deploy/ism-server"
            TEMP_DIR="/tmp"
            RELEASE_DIR="$TEMP_DIR/ism-server-release"
            BACKUP_PATH="$TEMP_DIR/ism-server-backup"
            PM2_NAME="ism-server"
            DEPLOY_USER="$(whoami)"

            cleanup() {
              rm -rf "$RELEASE_DIR" "$BACKUP_PATH"
              rm -f "$TEMP_DIR/server-deploy.tar.gz"
            }
            trap cleanup EXIT

            echo "=========================================="
            echo "Starting Server Deployment..."
            echo "=========================================="

            # Determine sudo availability (prefer passwordless sudo)
            SUDO=''
            if [ "$(id -u)" -ne 0 ]; then
              if sudo -n true 2>/dev/null; then
                SUDO='sudo'
                echo "[INFO] passwordless sudo available"
              else
                echo "[WARN] passwordless sudo not available"
              fi
            fi

            echo "[INFO] Preparing release files in $RELEASE_DIR"
            rm -rf "$RELEASE_DIR" "$BACKUP_PATH"
            mkdir -p "$RELEASE_DIR" "$BACKUP_PATH"
            tar -xzf "$TEMP_DIR/server-deploy.tar.gz" -C "$RELEASE_DIR"

            if [ ! -f "$RELEASE_DIR/dist/server.js" ]; then
              echo "[ERROR] Release package is invalid - dist/server.js not found"
              exit 1
            fi

            # Ensure target exists and is writable before touching current deployment
            if [ -n "$SUDO" ]; then
              $SUDO mkdir -p "$SERVER_PATH"
              $SUDO chown -R "$DEPLOY_USER":"$DEPLOY_USER" "$SERVER_PATH" || true
            else
              mkdir -p "$SERVER_PATH"
              if [ ! -w "$SERVER_PATH" ]; then
                echo "[ERROR] $SERVER_PATH is not writable by user $DEPLOY_USER"
                echo "[ERROR] Fix on the VPS once with:"
                echo "sudo chown -R $DEPLOY_USER:$DEPLOY_USER $SERVER_PATH"
                exit 1
              fi
            fi

            # Create backup if target exists
            if [ -d "$SERVER_PATH/dist" ]; then
              echo "[INFO] Creating backup of current deployment..."
              cp -a "$SERVER_PATH/dist" "$BACKUP_PATH/" || true
              cp -a "$SERVER_PATH/node_modules" "$BACKUP_PATH/" 2>/dev/null || true
              echo "[INFO] Backup created at $BACKUP_PATH"
            fi

            echo "[INFO] Updating live deployment files..."
            if [ -n "$SUDO" ]; then
              $SUDO rm -rf "$SERVER_PATH/dist" "$SERVER_PATH/package.json" "$SERVER_PATH/package-lock.json"
              $SUDO cp -a "$RELEASE_DIR/dist" "$SERVER_PATH/"
              $SUDO cp "$RELEASE_DIR/package.json" "$SERVER_PATH/package.json"
              $SUDO cp "$RELEASE_DIR/package-lock.json" "$SERVER_PATH/package-lock.json"
            else
              rm -rf "$SERVER_PATH/dist" "$SERVER_PATH/package.json" "$SERVER_PATH/package-lock.json"
              cp -a "$RELEASE_DIR/dist" "$SERVER_PATH/"
              cp "$RELEASE_DIR/package.json" "$SERVER_PATH/package.json"
              cp "$RELEASE_DIR/package-lock.json" "$SERVER_PATH/package-lock.json"
            fi

            # Verify build (check for server.js entry point)
            if [ ! -f "$SERVER_PATH/dist/server.js" ]; then
              echo "[ERROR] Server deployment failed - dist/server.js not found"
              echo "[INFO] Restoring from backup..."
              if [ -d "$BACKUP_PATH/dist" ]; then
                if [ -n "$SUDO" ]; then
                  $SUDO rm -rf "$SERVER_PATH/dist"
                  $SUDO cp -a "$BACKUP_PATH/dist" "$SERVER_PATH/"
                else
                  rm -rf "$SERVER_PATH/dist"
                  cp -a "$BACKUP_PATH/dist" "$SERVER_PATH/"
                fi
              fi
              exit 1
            fi

            # Install dependencies
            echo "[INFO] Installing production dependencies..."
            cd "$SERVER_PATH"
            npm ci --omit=dev

            # Check if PM2 is available
            export PATH="$PATH:$HOME/.npm-global/bin:$HOME/.local/bin"
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "[ERROR] PM2 is not installed on VPS"
              exit 1
            fi

            # Reload PM2 process
            echo "[INFO] Reloading PM2 process: $PM2_NAME"
            if pm2 info "$PM2_NAME" > /dev/null 2>&1; then
              pm2 restart "$PM2_NAME" --update-env
              echo "[SUCCESS] Process $PM2_NAME restarted"
            else
              echo "[INFO] Process not running, starting new instance..."
              pm2 start dist/server.js --name "$PM2_NAME" --update-env
              echo "[SUCCESS] Process $PM2_NAME started"
            fi

            pm2 save

            # Verify PM2 status
            echo "[INFO] Verifying process status..."
            pm2 info "$PM2_NAME"

            # Cleanup
            rm -f "$TEMP_DIR/server-deploy.tar.gz" || true
            echo "[INFO] Cleanup completed"

            echo "=========================================="
            echo "Server Deployment Complete!"
            echo "=========================================="
