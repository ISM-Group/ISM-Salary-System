name: Deploy Server to VPS

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
      - '.github/workflows/server-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install & Build Server
        working-directory: ./server
        env:
          NODE_ENV: production
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      - name: Compress Server Build
        run: |
          tar -czf server-deploy.tar.gz -C server dist/ package.json

      - name: Transfer Build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "server-deploy.tar.gz"
          target: "/tmp"

      - name: Extract & Deploy Server on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            SERVER_PATH="/home/deploy/ism-server"
            BACKUP_PATH="/home/deploy/ism-server-backup"
            TEMP_DIR="/tmp"
            PM2_NAME="ism-server"

            echo "=========================================="
            echo "Starting Server Deployment..."
            echo "=========================================="

            # Determine sudo availability (prefer passwordless sudo)
            SUDO=''
            DEPLOY_USER="$(whoami)"
            if [ "$(id -u)" -ne 0 ]; then
              if sudo -n true 2>/dev/null; then
                SUDO='sudo'
                echo "[INFO] passwordless sudo available"
              else
                echo "[WARN] passwordless sudo not available; operations on $SERVER_PATH may fail"
              fi
            fi

            # Create backup if target exists
            if $SUDO test -d "$SERVER_PATH/dist" >/dev/null 2>&1; then
              echo "[INFO] Creating backup of current deployment..."
              $SUDO rm -rf "$BACKUP_PATH" || true
              $SUDO mkdir -p "$BACKUP_PATH"
              $SUDO cp -a "$SERVER_PATH/dist" "$BACKUP_PATH/" || true
              $SUDO cp -a "$SERVER_PATH/node_modules" "$BACKUP_PATH/" 2>/dev/null || true
              echo "[INFO] Backup created at $BACKUP_PATH"
            fi

            # Ensure target exists
            if ! $SUDO test -d "$SERVER_PATH" >/dev/null 2>&1; then
              if [ -n "$SUDO" ]; then
                $SUDO mkdir -p "$SERVER_PATH"
                $SUDO chown -R "$DEPLOY_USER":"$DEPLOY_USER" "$SERVER_PATH" || true
              else
                mkdir -p "$SERVER_PATH" || true
              fi
            fi

            echo "[INFO] Extracting new build..."
            # Clean target and extract
            if [ -n "$SUDO" ]; then
              $SUDO rm -rf "$SERVER_PATH"/dist "$SERVER_PATH"/package.json || true
              $SUDO tar -xzf "$TEMP_DIR/server-deploy.tar.gz" -C "$SERVER_PATH" --strip-components=1
            else
              rm -rf "$SERVER_PATH"/dist "$SERVER_PATH"/package.json || true
              tar -xzf "$TEMP_DIR/server-deploy.tar.gz" -C "$SERVER_PATH" --strip-components=1
            fi

            # Verify build (check for server.js entry point)
            if [ ! -f "$SERVER_PATH/dist/server.js" ]; then
              echo "[ERROR] Server deployment failed - dist/server.js not found"
              echo "[INFO] Restoring from backup..."
              if [ -n "$SUDO" ]; then
                $SUDO rm -rf "$SERVER_PATH"/dist || true
                $SUDO cp -a "$BACKUP_PATH/dist" "$SERVER_PATH/" || true
              else
                rm -rf "$SERVER_PATH"/dist || true
                cp -a "$BACKUP_PATH/dist" "$SERVER_PATH/" || true
              fi
              exit 1
            fi

            # Install dependencies
            echo "[INFO] Installing production dependencies..."
            cd "$SERVER_PATH"
            npm ci --production

            # Check if PM2 is available
            if ! command -v pm2 &> /dev/null; then
              echo "[ERROR] PM2 is not installed on VPS"
              exit 1
            fi

            # Reload PM2 process
            echo "[INFO] Reloading PM2 process: $PM2_NAME"
            if pm2 info "$PM2_NAME" > /dev/null 2>&1; then
              pm2 restart "$PM2_NAME" --update-env
              echo "[SUCCESS] Process $PM2_NAME restarted"
            else
              echo "[INFO] Process not running, starting new instance..."
              pm2 start dist/server.js --name "$PM2_NAME" --update-env
              echo "[SUCCESS] Process $PM2_NAME started"
            fi

            pm2 save

            # Verify PM2 status
            echo "[INFO] Verifying process status..."
            pm2 info "$PM2_NAME"

            # Cleanup
            rm -f "$TEMP_DIR/server-deploy.tar.gz" || true
            echo "[INFO] Cleanup completed"

            echo "=========================================="
            echo "Server Deployment Complete!"
            echo "=========================================="
