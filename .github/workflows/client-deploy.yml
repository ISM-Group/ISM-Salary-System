name: Deploy Client to VPS

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - '.github/workflows/client-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install & Build Client
        working-directory: ./client
        env:
          CI: true
          VITE_API_URL: https://api.salary.ismgroup.lk/api
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      - name: Compress Client Build
        run: |
          tar -czf client-deploy.tar.gz -C client dist/

      - name: Transfer Build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "client-deploy.tar.gz"
          target: "/tmp"

      - name: Extract & Deploy Client on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            CLIENT_PATH="/var/www/ism-client"
            BACKUP_PATH="/var/www/ism-client-backup"
            TEMP_DIR="/tmp"

            echo "=========================================="
            echo "Starting Client Deployment..."
            echo "=========================================="

            # Determine sudo availability (prefer passwordless sudo)
            SUDO=''
            DEPLOY_USER="$(whoami)"
            if [ "$(id -u)" -ne 0 ]; then
              if sudo -n true 2>/dev/null; then
                SUDO='sudo'
                echo "[INFO] passwordless sudo available"
              else
                echo "[WARN] passwordless sudo not available; operations on /var/www may fail"
              fi
            fi

            # Create backup if target exists
            if $SUDO test -d "$CLIENT_PATH"; then
              echo "[INFO] Creating backup of current deployment..."
              $SUDO rm -rf "$BACKUP_PATH" || true
              $SUDO mkdir -p "$BACKUP_PATH"
              $SUDO cp -a "$CLIENT_PATH/." "$BACKUP_PATH/" || true
              echo "[INFO] Backup created at $BACKUP_PATH"
            fi

            # Ensure target exists (create with sudo if required)
            if ! $SUDO test -d "$CLIENT_PATH" >/dev/null 2>&1; then
              if [ -n "$SUDO" ]; then
                $SUDO mkdir -p "$CLIENT_PATH"
                $SUDO chown -R "$DEPLOY_USER":"$DEPLOY_USER" "$CLIENT_PATH" || true
              else
                mkdir -p "$CLIENT_PATH" || true
              fi
            fi

            echo "[INFO] Extracting new build..."
            # Clean target and extract
            if [ -n "$SUDO" ]; then
              $SUDO rm -rf "$CLIENT_PATH"/* || true
              $SUDO tar -xzf "$TEMP_DIR/client-deploy.tar.gz" -C "$CLIENT_PATH" --strip-components=1
            else
              rm -rf "$CLIENT_PATH"/* || true
              tar -xzf "$TEMP_DIR/client-deploy.tar.gz" -C "$CLIENT_PATH" --strip-components=1
            fi

            # Verify deployment (check for index.html or non-empty directory)
            if [ ! -f "$CLIENT_PATH/index.html" ] && [ -z "$(ls -A "$CLIENT_PATH" 2>/dev/null)" ]; then
              echo "[ERROR] Client deployment failed - target directory empty or missing index.html"
              echo "[INFO] Restoring from backup..."
              if [ -n "$SUDO" ]; then
                $SUDO rm -rf "$CLIENT_PATH" || true
                $SUDO cp -a "$BACKUP_PATH/." "$CLIENT_PATH/" || true
              else
                rm -rf "$CLIENT_PATH" || true
                cp -a "$BACKUP_PATH/." "$CLIENT_PATH/" || true
              fi
              exit 1
            fi

            echo "[INFO] Client build deployed successfully"

            # Reload Nginx (use sudo if available)
            echo "[INFO] Reloading Nginx..."
            if [ -n "$SUDO" ]; then
              $SUDO systemctl reload nginx && echo "[SUCCESS] Nginx reloaded successfully" || echo "[WARNING] Failed to reload Nginx, but deployment is complete"
            else
              if command -v sudo >/dev/null 2>&1; then
                sudo systemctl reload nginx && echo "[SUCCESS] Nginx reloaded successfully" || echo "[WARNING] Failed to reload Nginx, but deployment is complete"
              else
                echo "[WARNING] Skipping Nginx reload (no sudo)"
              fi
            fi

            # Cleanup
            rm -f "$TEMP_DIR/client-deploy.tar.gz" || true
            echo "[INFO] Cleanup completed"

            echo "=========================================="
            echo "Client Deployment Complete!"
            echo "=========================================="
